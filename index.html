<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostek Jacdac ➔ Easer (Wadera) Real-Test</title>
    <script src="https://unpkg.com/jacdac-ts/dist/jacdac.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #fff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #00adb5; border: none; color: white; border-radius: 5px; margin: 10px; }
        button:hover { background: #007a80; }
        #toggleLogBtn { background: #393e46; }
        #status { margin-top: 20px; font-weight: bold; color: #ff2e63; font-size: 18px; }
        .log-container { display: none; margin-top: 20px; text-align: left; }
        .log { background: #222831; padding: 15px; border-radius: 5px; min-height: 120px; font-family: monospace; overflow-y: auto; max-height: 250px; white-space: pre-wrap; color: #a3f7bf; }
    </style>
</head>
<body>

    <h1>Mostek Jacdac ➔ Easer (Wadera)</h1>
    <p>Podłącz micro:bit kablowo i kliknij przycisk połączenia.</p>

    <button id="connectBtn">Połącz z Jacdac (USB)</button>
    <button id="toggleLogBtn">Pokaż logi</button>
    
    <div id="status">Status: Rozłączono</div>

    <div id="logContainer" class="log-container">
        <h3>Logi transmisji sprzętowej:</h3>
        <div id="log" class="log">Uruchomiono mostek...</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const toggleLogBtn = document.getElementById('toggleLogBtn');
        const statusDiv = document.getElementById('status');
        const logContainer = document.getElementById('logContainer');
        const logDiv = document.getElementById('log');

        let deviceList = [];
        let lastRawValues = {}; 
        let bus = null;

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        toggleLogBtn.addEventListener('click', () => {
            if (logContainer.style.display === "none" || logContainer.style.display === "") {
                logContainer.style.display = "block";
                toggleLogBtn.innerText = "Ukryj logi";
            } else {
                logContainer.style.display = "none";
                toggleLogBtn.innerText = "Pokaż logi";
            }
        });

        // Wysyłanie natywnego komunikatu Android Intent
        function sendIntentToEaser(guzikId, stateType) {
            const valueToSend = `guzik${guzikId}_${stateType}`;
            
            // Rejestrujemy dokładnie to, co Easer (Wadera) filtruje w systemie
            const intentUrl = `intent:#Intent;action=pl.maxis.JACDAC_ACTION;category=android.intent.category.DEFAULT;S.guzik=${valueToSend};end`;
            
            log(`➔ TRANSMISJA DO SYSTEMU: ${valueToSend}`);
            
            // Strzał intencji w tle
            const link = document.createElement('a');
            link.href = intentUrl;
            link.click();
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Łączenie...";
                bus = jacdac.createWebBus();
                bus.passive = false; 

                await bus.connect();
                
                statusDiv.innerText = "Połączono z Jacdac!";
                statusDiv.style.color = "#00adb5";
                log("[System] Szyna Jacdac nasłuchuje micro:bita.");

                bus.on('packetReceive', (packet) => {
                    if (!packet.data || packet.data.length === 0 || packet.serviceNumber === 0) return;

                    const devId = packet.deviceId;
                    const shortId = packet.device ? packet.device.shortId : devId.substring(0,4);

                    if (!deviceList.includes(devId)) {
                        deviceList.push(devId);
                        lastRawValues[devId] = -1;
                        log(`[WYKRYTO SPRZĘT] Nowy moduł: ${shortId} ➔ Przypisany jako ID: ${deviceList.length}`);
                    }

                    const deviceIndex = deviceList.indexOf(devId) + 1;
                    let currentByte = packet.data[0];

                    if (packet.isEvent) {
                        if (packet.eventCode === 0x1) currentByte = 1;
                        if (packet.eventCode === 0x2) currentByte = 0;
                    }

                    if (currentByte !== lastRawValues[devId]) {
                        if (currentByte === 0 || currentByte === 1) {
                            lastRawValues[devId] = currentByte;

                            if (currentByte === 1) {
                                log(`[Fizyczny klik] Moduł ${shortId}: WCIŚNIĘTY`);
                                sendIntentToEaser(deviceIndex, "pressed");
                            } else {
                                log(`[Fizyczny klik] Moduł ${shortId}: PUSZCZONY`);
                                sendIntentToEaser(deviceIndex, "released");
                            }
                        }
                    }
                });

            } catch (err) {
                statusDiv.innerText = "Błąd połączenia";
                log(`BŁĄD PAROWANIA: ${err.message}`);
            }
        });
    </script>
</body>
</html>
