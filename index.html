<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jacdac➔Tasker</title>
    <script src="https://unpkg.com/jacdac-ts/dist/jacdac.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #fff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #00adb5; border: none; color: white; border-radius: 5px; margin: 10px; }
        button:hover { background: #007a80; }
        #toggleLogBtn { background: #393e46; }
        #status { margin-top: 20px; font-weight: bold; color: #ff2e63; font-size: 18px; }
        .log-container { display: none; margin-top: 20px; text-align: left; }
        .log { background: #222831; padding: 15px; border-radius: 5px; min-height: 120px; font-family: monospace; overflow-y: auto; max-height: 250px; white-space: pre-wrap; color: #a3f7bf; }
        .config-box { margin: 20px auto; padding: 15px; background: #1a1a1a; border-radius: 8px; max-width: 400px; }
        input { padding: 8px; width: 80%; background: #222; border: 1px solid #444; color: #fff; text-align: center; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>Mostek Jacdac ➔ Tasker</h1>
    <p>Podłącz micro:bit przez USB i kliknij przycisk połączenia.</p>
    
    <div class="config-box">
        <label for="taskerIp">Adres IP telefonu z portem Taskera:</label><br><br>
        <input type="text" id="taskerIp" value="http://localhost:1821">
    </div>

    <button id="connectBtn">Połącz z Jacdac (USB)</button>
    <button id="toggleLogBtn">Pokaż logi</button>
    
    <div id="status">Status: Rozłączono</div>

    <div id="logContainer" class="log-container">
        <h3>Logi systemowe:</h3>
        <div id="log" class="log">Uruchomiono...</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const toggleLogBtn = document.getElementById('toggleLogBtn');
        const statusDiv = document.getElementById('status');
        const logContainer = document.getElementById('logContainer');
        const logDiv = document.getElementById('log');
        const taskerIpInput = document.getElementById('taskerIp');

        let detectedButtons = [];
        let lastStates = {}; // Zapamiętujemy poprzedni stan guzika (żeby nie wysyłać spamu)
        let bus = null;

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        toggleLogBtn.addEventListener('click', () => {
            if (logContainer.style.display === "none" || logContainer.style.display === "") {
                logContainer.style.display = "block";
                toggleLogBtn.innerText = "Ukryj logi";
            } else {
                logContainer.style.display = "none";
                toggleLogBtn.innerText = "Pokaż logi";
            }
        });

        async function sendToTasker(guzikId, stateType) {
            const baseUrl = taskerIpInput.value.trim();
            // Przesyłamy np. /guzik1_pressed lub /guzik1_released
            const url = `${baseUrl}/guzik${guzikId}_${stateType}`;
            log(`Wysyłam do Taskera: ${url}`);
            try {
                await fetch(url, { method: 'GET', mode: 'no-cors' });
                log(`Sukces: guzik${guzikId} (${stateType})`);
            } catch (err) {
                log(`Błąd Taskera: ${err.message}`);
            }
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Łączenie...";
                log("Sprawdzanie wsparcia dla WebUSB...");
                
                if (!navigator.usb) {
                    throw new Error("Brak wsparcia dla WebUSB w przeglądarce!");
                }

                log("Inicjalizacja Jacdac (tryb aktywnego odpytywania)...");
                bus = jacdac.createWebBus();
                bus.passive = false; 

                log("Otwieranie okna wyboru urządzenia USB...");
                await bus.connect();
                
                statusDiv.innerText = "Połączono z Jacdac!";
                statusDiv.style.color = "#00adb5";
                log("Sukces! Słucham zmian rejestrów przycisków...");

                bus.on('deviceConnect', (device) => {
                    log(`Wykryto urządzenie w sieci USB: ${device.shortId}`);
                });

                // Zamiast czekać na zdarzenia (.on('event')), sprawdzamy raporty serwisów
                bus.on('serviceAnnounce', (service) => {
                    // Kod klasy Button: 0x1473d260
                    if (service.serviceClass === 0x1473d260 || service.serviceClass === 343134816) {
                        const devId = service.device.deviceId;

                        if (!detectedButtons.includes(devId)) {
                            detectedButtons.push(devId);
                            lastStates[devId] = false; // Domyślnie puszczony
                            log(`[ZAREJESTROWANO] Guzik ${service.device.shortId} -> Jako Przycisk ${detectedButtons.length}`);
                        }

                        // Pobieramy rejestr "isPressed" (Kod rejestru: 0x101)
                        const pressedRegister = service.register(0x101);
                        
                        // Zmuszamy magistralę do automatycznego odpytywania tego rejestru
                        pressedRegister.subscribe(() => {
                            const isPressed = !!pressedRegister.boolValue;
                            const buttonNum = detectedButtons.indexOf(devId) + 1;
                            
                            // Reagujemy tylko wtedy, gdy stan się realnie zmienił
                            if (isPressed !== lastStates[devId]) {
                                lastStates[devId] = isPressed;
                                
                                if (isPressed) {
                                    log(`[STAN] Fizyczny Przycisk ${buttonNum}: is pressed`);
                                    sendToTasker(buttonNum, "pressed");
                                } else {
                                    log(`[STAN] Fizyczny Przycisk ${buttonNum}: is released`);
                                    sendToTasker(buttonNum, "released");
                                }
                            }
                        });
                    }
                });

            } catch (err) {
                statusDiv.innerText = "Błąd połączenia";
                log(`BŁĄD: ${err.message}`);
                console.error(err);
            }
        });
    </script>
</body>
</html>
