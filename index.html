<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostek Jacdac ➔ Easer Transmisja v2</title>
    <script src="https://unpkg.com/jacdac-ts/dist/jacdac.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #fff; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #00adb5; border: none; color: white; border-radius: 5px; margin: 10px; }
        button:hover { background: #007a80; }
        #toggleLogBtn { background: #393e46; }
        #status { margin-top: 20px; font-weight: bold; color: #ff2e63; font-size: 18px; }
        .log-container { display: none; margin-top: 20px; text-align: left; }
        .log { background: #222831; padding: 15px; border-radius: 5px; min-height: 120px; font-family: monospace; overflow-y: auto; max-height: 250px; white-space: pre-wrap; color: #a3f7bf; }
    </style>
</head>
<body>

    <h1>Mostek Jacdac ➔ Easer (Transmisja v2)</h1>
    <p>Podłącz micro:bit i kliknij przycisk połączenia.</p>

    <button id="connectBtn">Połącz z Jacdac</button>
    <button id="toggleLogBtn">Pokaż logi</button>
    
    <div id="status">Status: Rozłączono</div>

    <div id="logContainer" class="log-container">
        <h3>Logi transmisji systemowej:</h3>
        <div id="log" class="log">Uruchomiono...</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const toggleLogBtn = document.getElementById('toggleLogBtn');
        const statusDiv = document.getElementById('status');
        const logContainer = document.getElementById('logContainer');
        const logDiv = document.getElementById('log');

        let bus = null;

        function log(message) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${time}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        toggleLogBtn.addEventListener('click', () => {
            logContainer.style.display = (logContainer.style.display === "none" || logContainer.style.display === "") ? "block" : "none";
            toggleLogBtn.innerText = logContainer.style.display === "block" ? "Ukryj logi" : "Pokaż logi";
        });

        // Wysyłanie ulepszonej intencji systemowej (z flagą uruchamiania w nowym oknie)
        function sendIntentToEaser(status) {
            // Dodajemy launchFlags=0x10000000 (FLAG_ACTIVITY_NEW_TASK), co pozwala na start apek z tła
            const intentUrl = `intent:#Intent;action=pl.maxis.JACDAC_ACTION;category=android.intent.category.DEFAULT;launchFlags=0x10000000;S.guzik=${status};end`;
            
            log(`➔ Nadaję intencję systemową: ${status}`);
            
            const link = document.createElement('a');
            link.href = intentUrl;
            link.click();
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Łączenie...";
                bus = jacdac.createWebBus();
                bus.passive = false;

                await bus.connect();
                
                statusDiv.innerText = "Połączono z Jacdac!";
                statusDiv.style.color = "#00adb5";
                log("Szyna aktywna. Mapowanie fizycznych kliknięć na intencje...");

                // Łapiemy bezpośrednią usługę przycisku przez Jacdac
                bus.on('serviceConnect', (service) => {
                    if (service.serviceClass === 0x1473d260) {
                        log(`[SPRZĘT] Sparowano przycisk: ${service.device.shortId}`);

                        // Precyzyjne nasłuchiwanie zdarzeń przycisku
                        service.on('event', (packet) => {
                            if (packet.eventCode === 0x1) { // Kliknięcie (Down)
                                log("[Fizyczny Klik] WCIŚNIĘTY");
                                sendIntentToEaser("guzik1_pressed");
                            }
                            if (packet.eventCode === 0x2) { // Puszczenie (Up)
                                log("[Fizyczny Klik] PUSZCZONY");
                                sendIntentToEaser("guzik1_released");
                            }
                        });
                    }
                });

            } catch (err) {
                statusDiv.innerText = "Błąd połączenia";
                log(`BŁĄD: ${err.message}`);
            }
        });
    </script>
</body>
</html>
