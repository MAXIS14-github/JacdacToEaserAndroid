<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Ostateczna Naprawa Mostka</title>
    <script src="https://unpkg.com/jacdac-ts/dist/jacdac.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: #fff; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00adb5; border: none; color: white; border-radius: 5px; }
        #log { background: #222831; padding: 15px; margin-top: 20px; text-align: left; font-family: monospace; min-height: 200px; color: #a3f7bf; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>Mostek Naprawczy Jacdac</h1>
    <button id="connectBtn">POŁĄCZ Z MICRO:BIT</button>
    <div id="log">Logi systemowe:\n</div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const logDiv = document.getElementById('log');

        function log(msg) {
            logDiv.innerText += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
        }

        // Funkcja wysyłająca intencję do Easera (Wadery)
        function sendIntentToEaser() {
            log("➔ Strzał intencji do Easera!");
            const intentUrl = `intent:#Intent;action=pl.maxis.JACDAC_ACTION;category=android.intent.category.DEFAULT;S.guzik=guzik1_pressed;end`;
            const link = document.createElement('a');
            link.href = intentUrl;
            link.click();
        }

        connectBtn.addEventListener('click', async () => {
            try {
                log("Uruchamianie szyny Jacdac...");
                
                // Tworzymy transport WebUSB bezpośrednio
                const bus = jacdac.createWebBus();
                
                // Wymuszamy start nasłuchiwania pakietów
                bus.on('packetReceive', (packet) => {
                    // Kod usługi przycisku (0x1473d260) lub ogólny pakiet zdarzenia
                    if (packet.serviceNumber !== 0 && packet.isEvent) {
                        if (packet.eventCode === 0x1) {
                            log(" FIZYCZNY KLIK WYKRYTY (Event 0x1)");
                            sendIntentToEaser();
                        }
                    }
                });

                log("Otwieranie okna parowania przeglądarki...");
                await bus.connect();
                log(" Sukces! Strona nawiązała kontakt z micro:bitem.");

            } catch (err) {
                log(`BŁĄD KODU: ${err.message}`);
            }
        });
    </script>
</body>
</html>
